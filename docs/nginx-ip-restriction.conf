# Nginx Configuration Snippet: IP-Restricting Admin Endpoints
#
# Put this within the server block of your Nginx configuration.
# This prevents external access to POST /admin/rotate-key and any other /admin routes.

location /admin {
    # Allow local development and testing
    allow 127.0.0.1;
    allow ::1;

    # Allow trusted VPN/internal subnet (example IPs)
    # Replace these with your actual internal subnet/VPN IP ranges
    allow 10.0.0.0/8;
    allow 192.168.1.0/24;

    # Deny everyone else
    deny all;

    # Proxy configuration to forward matching requests to the StreamPay Express API
    proxy_pass http://localhost:3001; # Replace with actual API upstream/port
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
